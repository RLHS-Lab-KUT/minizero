<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCTS Search Tree Viewer — Othello / Gumbel AlphaZero</title>
<style>
  :root{
    --bg:#11151c; --panel:#171c25; --line:#283142; --ink:#e7ecf3; --muted:#8a97ab;
    --board:#1f7a4d; --boardln:#0c4a2e; --boardedge:#0c3a24;
    --black:#111418; --blackedge:#5a6577; --white:#f2f5fa; --whiteedge:#0c3a24;
    --sel:#ffb454; --pv:#4fd6c4; --accent:#6ea8ff; --path:#ff7a9c;
    --bser:#cdd6e3; --wser:#ffd27a;
    --mono:"SFMono-Regular",ui-monospace,"DejaVu Sans Mono",Menlo,Consolas,monospace;
    --sans:system-ui,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:13px;display:flex;flex-direction:column}
  header{display:flex;gap:14px;align-items:center;flex-wrap:wrap;padding:10px 16px;border-bottom:1px solid var(--line);background:var(--panel)}
  header h1{font-size:14px;font-weight:600;margin:0;letter-spacing:.02em}
  header .meta{color:var(--muted);font-family:var(--mono);font-size:12px}
  .spacer{flex:1}
  .lbl{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.08em;margin:0 0 9px}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:7px;overflow:hidden}
  .seg button{background:transparent;color:var(--muted);border:0;padding:5px 11px;font-family:var(--mono);font-size:12px;cursor:pointer}
  .seg button.on{background:var(--accent);color:#0b0e14;font-weight:600}
  .btn{background:transparent;color:var(--ink);border:1px solid var(--line);border-radius:7px;padding:5px 11px;cursor:pointer;font-size:12px}
  .btn:hover{border-color:var(--muted)}
  .plybar{display:flex;align-items:center;gap:12px;padding:8px 16px;border-bottom:1px solid var(--line);background:#10141b}
  .plybar input[type=range]{flex:1;accent-color:var(--accent)}
  .plybar .pos{font-family:var(--mono);font-size:12px;color:var(--muted);white-space:nowrap;min-width:150px;text-align:right}
  .iconbtn{background:transparent;border:1px solid var(--line);color:var(--ink);border-radius:6px;width:32px;height:28px;cursor:pointer;font-size:12px}
  .iconbtn:hover{border-color:var(--muted)}
  main{display:grid;grid-template-columns:minmax(290px,340px) 1fr minmax(210px,270px);flex:1;min-height:0}
  section{padding:14px 16px;overflow:auto;min-width:0}
  section + section{border-left:1px solid var(--line)}
  #board{width:100%;height:auto;display:block}
  #treeWrap{height:calc(100% - 26px);overflow:auto;border:1px solid var(--line);border-radius:8px;background:#0e1219}
  #tree{display:block}
  .tnode rect{stroke:var(--line);stroke-width:1;fill:var(--panel);cursor:pointer}
  .tnode:hover rect{stroke:var(--muted)}
  .tnode.onpath rect{stroke:var(--path);stroke-width:1.6}
  .tnode.sel rect{stroke:var(--sel);stroke-width:2.4}
  .tnode.pv rect{fill:#16302d}
  .tnode text{font-family:var(--mono);fill:var(--ink);pointer-events:none}
  .tnode .sub{fill:var(--muted)}
  .edge{stroke:#33405a;stroke-width:1;fill:none}
  .edge.pv{stroke:var(--pv);stroke-width:1.6}
  .edge.onpath{stroke:var(--path);stroke-width:2}
  table.kv{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12px}
  table.kv td{padding:4px 2px;border-bottom:1px solid var(--line);vertical-align:top}
  table.kv td.k{color:var(--muted);white-space:nowrap;padding-right:10px}
  table.kv td.v{text-align:right;word-break:break-all}
  .pill{display:inline-block;padding:1px 7px;border-radius:99px;font-family:var(--mono);font-size:11px;border:1px solid var(--line);color:var(--muted)}
  .pill.b{background:var(--black);color:#cfd6e1;border-color:#000}
  .pill.w{background:var(--white);color:#0d0f13;border-color:#cfd6e1}
  .argmax .row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--line);font-family:var(--mono);font-size:12px}
  .argmax .row span:first-child{color:var(--muted)}
  .hint{color:var(--muted);font-size:11px;margin-top:10px;line-height:1.5}
  .chart{border-top:1px solid var(--line);background:#10141b;padding:8px 16px 10px}
  .chart .head{display:flex;align-items:center;gap:16px;margin-bottom:2px}
  .chart .legend{display:flex;gap:14px;font-family:var(--mono);font-size:11px;color:var(--muted)}
  .chart .legend i{display:inline-block;width:18px;height:0;border-top:2px solid;vertical-align:middle;margin-right:5px}
  #chart{width:100%;height:130px;display:block;cursor:pointer}
  input[type=file]{display:none}
  textarea{width:100%;height:120px;background:#0e1219;color:var(--ink);border:1px solid var(--line);border-radius:7px;font-family:var(--mono);font-size:11px;padding:8px;margin-top:8px}
  dialog{background:var(--panel);color:var(--ink);border:1px solid var(--line);border-radius:10px;width:min(560px,90vw)}
  dialog::backdrop{background:rgba(0,0,0,.55)}
</style>
</head>
<body>
<header>
  <h1>MCTS Search Tree Viewer</h1>
  <span class="meta" id="metaInfo">—</span>
  <div class="spacer"></div>
  <span class="lbl" style="margin:0 4px 0 0">盤面の指標</span>
  <div class="seg" id="metricSeg">
    <button data-m="N" class="on">N</button><button data-m="Q">Q</button><button data-m="P">P</button>
  </div>
  <label class="btn" for="fileIn">JSONを開く</label>
  <input type="file" id="fileIn" accept=".json,application/json">
  <button class="btn" id="pasteBtn">貼り付け</button>
</header>

<div class="plybar">
  <button class="iconbtn" id="prevBtn" title="前の手">◀</button>
  <button class="iconbtn" id="playBtn" title="再生/停止">▶</button>
  <button class="iconbtn" id="nextBtn" title="次の手">▶▶</button>
  <input type="range" id="plySlider" min="0" max="0" value="0">
  <span class="pos" id="plyPos">手番 0 / 0</span>
</div>

<main>
  <section>
    <p class="lbl">盤面 · 選択ノードまでの経路を番号表示</p>
    <svg id="board" viewBox="0 0 360 360" aria-label="board"></svg>
    <p class="hint" id="boardHint"></p>
  </section>
  <section>
    <p class="lbl">探索木 · クリックで選択 / 緑=主変化 / 桃=選択経路</p>
    <div id="treeWrap"><svg id="tree"></svg></div>
  </section>
  <section>
    <p class="lbl">ノード評価</p>
    <div id="evalBox"></div>
    <div class="argmax" id="argmaxBox"></div>
  </section>
</main>

<div class="chart">
  <div class="head">
    <p class="lbl" style="margin:0">評価推移(root Q · 手番視点) · クリックで移動</p>
    <div class="legend">
      <span><i style="border-color:var(--bser)"></i>黒の手番</span>
      <span><i style="border-color:var(--wser)"></i>白の手番</span>
    </div>
  </div>
  <svg id="chart"></svg>
</div>

<dialog id="pasteDlg">
  <form method="dialog" style="padding:16px">
    <p class="lbl">tree_json / game.json の出力を貼り付け</p>
    <textarea id="pasteArea" placeholder='単一局面 {"game":...,"root":...} もしくは 対局 {"moves":[...]}'></textarea>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:10px">
      <button class="btn" value="cancel">キャンセル</button>
      <button class="btn" id="pasteOk" value="ok" style="border-color:var(--accent);color:var(--accent)">読み込む</button>
    </div>
  </form>
</dialog>

<script>
const COLS="ABCDEFGH";
let GAME=null, PLY=0, METRIC="N", SELECTED=null, playTimer=null;

const SINGLE={"game":"othello_8x8","board_size":8,"to_play":"B","board":[[null,null,null,null,null,null,null,null],[null,null,null,null,null,null,null,null],[null,null,null,null,null,null,null,null],[null,null,null,"B","W",null,null,null],[null,null,null,"W","B",null,null,null],[null,null,null,null,null,null,null,null],[null,null,null,null,null,null,null,null],[null,null,null,null,null,null,null,null]],"root":{"action_id":null,"row":null,"col":null,"player":null,"N":17,"Q":-0.10448,"P":0,"p_logit":0,"p_noise":0,"v":-0.1144,"r":0,"children":[{"action_id":34,"row":4,"col":2,"player":"B","N":4,"Q":-0.103356,"P":0.271433,"p_logit":11.8787,"p_noise":-0.620364,"v":-0.0980872,"r":0,"children":[{"action_id":44,"row":5,"col":4,"player":"W","N":3,"Q":-0.105113,"P":0.992427,"p_logit":14.4338,"p_noise":0,"v":-0.113884,"r":0,"children":[{"action_id":37,"row":4,"col":5,"player":"B","N":2,"Q":-0.100727,"P":0.912923,"p_logit":13.412,"p_noise":0,"v":-0.0923213,"r":0,"children":[{"action_id":26,"row":3,"col":2,"player":"W","N":1,"Q":-0.109132,"P":0.994937,"p_logit":13.8169,"p_noise":0,"v":-0.109132,"r":0,"children":[]}]}]}]},{"action_id":43,"row":5,"col":3,"player":"B","N":4,"Q":-0.101427,"P":0.267204,"p_logit":12.5633,"p_noise":0.0798844,"v":-0.0998248,"r":0,"children":[{"action_id":26,"row":3,"col":2,"player":"W","N":3,"Q":-0.101962,"P":0.990897,"p_logit":14.6128,"p_noise":0,"v":-0.117512,"r":0,"children":[{"action_id":19,"row":2,"col":3,"player":"B","N":2,"Q":-0.0941867,"P":0.911066,"p_logit":13.675,"p_noise":0,"v":-0.0781768,"r":0,"children":[{"action_id":44,"row":5,"col":4,"player":"W","N":1,"Q":-0.110197,"P":0.996438,"p_logit":14.3729,"p_noise":0,"v":-0.110197,"r":0,"children":[]}]}]}]},{"action_id":20,"row":2,"col":4,"player":"B","N":4,"Q":-0.107698,"P":0.23194,"p_logit":11.6732,"p_noise":-0.668622,"v":-0.0983771,"r":0,"children":[{"action_id":37,"row":4,"col":5,"player":"W","N":3,"Q":-0.110805,"P":0.992605,"p_logit":14.1295,"p_noise":0,"v":-0.113712,"r":0,"children":[{"action_id":44,"row":5,"col":4,"player":"B","N":2,"Q":-0.109351,"P":0.930235,"p_logit":13.9809,"p_noise":0,"v":-0.0984914,"r":0,"children":[{"action_id":19,"row":2,"col":3,"player":"W","N":1,"Q":-0.120211,"P":0.990338,"p_logit":13.7399,"p_noise":0,"v":-0.120211,"r":0,"children":[]}]}]}]},{"action_id":29,"row":3,"col":5,"player":"B","N":4,"Q":-0.102957,"P":0.229177,"p_logit":12.5691,"p_noise":0.239271,"v":-0.0980872,"r":0,"children":[{"action_id":19,"row":2,"col":3,"player":"W","N":3,"Q":-0.104581,"P":0.992427,"p_logit":14.4338,"p_noise":0,"v":-0.113884,"r":0,"children":[{"action_id":26,"row":3,"col":2,"player":"B","N":2,"Q":-0.0999295,"P":0.912923,"p_logit":13.412,"p_noise":0,"v":-0.0923213,"r":0,"children":[{"action_id":37,"row":4,"col":5,"player":"W","N":1,"Q":-0.107538,"P":0.994937,"p_logit":13.8169,"p_noise":0,"v":-0.107538,"r":0,"children":[]}]}]}]}]}};

const fmt=(x)=> x==null?"—":(typeof x==="number"?(Number.isInteger(x)?x:x.toFixed(4)):x);
const coordOf=(n)=> n.row==null?"root":COLS[n.col]+(n.row+1);
const cur=()=> GAME.moves[PLY];
const metricVal=(n)=> METRIC==="N"?n.N:METRIC==="Q"?n.Q:n.P;

function normalize(obj){
  if(obj.moves) return obj;
  return {game:obj.game, board_size:obj.board_size, moves:[Object.assign({ply:0,played:null},obj)]};
}
function indexTree(root){let id=0;(function w(n,p,d){n._id=id++;n._parent=p;n._depth=d;(n.children||[]).forEach(c=>w(c,n,d+1));})(root,null,0);}
function markPV(root){let n=root;n._pv=true;while(n.children&&n.children.length){let b=n.children[0];for(const c of n.children)if(c.N>b.N)b=c;b._pv=true;n=b;}}
function allNodes(root){const a=[];(function g(n){a.push(n);(n.children||[]).forEach(g);})(root);return a;}
function pathToSelected(){if(!SELECTED||SELECTED.row==null)return [];const p=[];let n=SELECTED;while(n&&n.row!=null){p.unshift(n);n=n._parent;}return p;}

function drawBoard(){
  const m=cur(), n=GAME.board_size, S=360, pad=18, cell=(S-2*pad)/n, svg=document.getElementById("board");
  const cx=(c)=>pad+c*cell+cell/2, cy=(r)=>S-pad-r*cell-cell/2;
  let h=`<rect x="0" y="0" width="${S}" height="${S}" fill="#11151c"/>`;
  h+=`<rect x="${pad}" y="${pad}" width="${S-2*pad}" height="${S-2*pad}" fill="var(--board)" stroke="var(--boardedge)" stroke-width="2"/>`;
  for(let i=0;i<=n;i++){const p=pad+i*cell;
    h+=`<line x1="${pad}" y1="${p}" x2="${S-pad}" y2="${p}" stroke="var(--boardln)" stroke-width="1"/>`;
    h+=`<line x1="${p}" y1="${pad}" x2="${p}" y2="${S-pad}" stroke="var(--boardln)" stroke-width="1"/>`;}
  for(let c=0;c<n;c++) h+=`<text x="${cx(c)}" y="${pad-6}" fill="var(--muted)" font-size="9" text-anchor="middle" font-family="var(--mono)">${COLS[c]}</text>`;
  for(let r=0;r<n;r++) h+=`<text x="${pad-9}" y="${cy(r)+3}" fill="var(--muted)" font-size="9" text-anchor="middle" font-family="var(--mono)">${r+1}</text>`;
  for(let r=0;r<n;r++)for(let c=0;c<n;c++){const v=m.board[r][c];if(!v)continue;
    const fill=v==="B"?"var(--black)":"var(--white)", stroke=v==="B"?"var(--blackedge)":"var(--whiteedge)";
    h+=`<circle cx="${cx(c)}" cy="${cy(r)}" r="${cell*0.38}" fill="${fill}" stroke="${stroke}" stroke-width="1.5"/>`;}

  const path=pathToSelected();
  if(path.length){
    let i=1;
    for(const k of path){
      const fill=k.player==="B"?"var(--black)":"var(--white)", tx=k.player==="B"?"#fff":"#111", last=(i===path.length);
      h+=`<circle cx="${cx(k.col)}" cy="${cy(k.row)}" r="${cell*0.40}" fill="${fill}" stroke="${last?'var(--sel)':'var(--path)'}" stroke-width="${last?3:2}"/>`;
      h+=`<text x="${cx(k.col)}" y="${cy(k.row)+3.5}" fill="${tx}" font-size="11" text-anchor="middle" font-family="var(--mono)" font-weight="600">${i}</text>`;
      i++;
    }
  } else {
    const kids=m.root.children||[], vals=kids.map(metricVal), lo=Math.min(...vals), hi=Math.max(...vals);
    const norm=(x)=>hi===lo?0.5:(x-lo)/(hi-lo);
    for(const k of kids){ if(k.row==null)continue;
      const t=norm(metricVal(k)), col=lerp([60,90,140],[255,180,84],t);
      h+=`<circle cx="${cx(k.col)}" cy="${cy(k.row)}" r="${cell*0.40}" fill="rgba(${col[0]},${col[1]},${col[2]},0.32)" stroke="rgb(${col[0]},${col[1]},${col[2]})" stroke-width="1.5"/>`;
      const txt=METRIC==="N"?k.N:metricVal(k).toFixed(2);
      h+=`<text x="${cx(k.col)}" y="${cy(k.row)+3}" fill="var(--ink)" font-size="9.5" text-anchor="middle" font-family="var(--mono)">${txt}</text>`;
    }
  }
  svg.innerHTML=h;
}
function lerp(a,b,t){return a.map((v,i)=>Math.round(v+(b[i]-v)*t));}

function drawTree(){
  const root=cur().root, NW=66,NH=34,HGAP=14,VGAP=54; let leaf=0;
  (function place(n){if(!n.children||!n.children.length){n._x=leaf*(NW+HGAP);leaf++;}else{n.children.forEach(place);n._x=(n.children[0]._x+n.children[n.children.length-1]._x)/2;}n._y=n._depth*(NH+VGAP);})(root);
  const all=allNodes(root), M=20;
  const W=Math.max(...all.map(n=>n._x))+NW+2*M, H=Math.max(...all.map(n=>n._y))+NH+2*M;
  const X=(n)=>n._x+M, Y=(n)=>n._y+M;
  const pathIds=new Set(pathToSelected().map(n=>n._id));
  let h="";
  for(const n of all)for(const c of (n.children||[])){
    const x1=X(n)+NW/2,y1=Y(n)+NH,x2=X(c)+NW/2,y2=Y(c),my=(y1+y2)/2;
    const cls=(pathIds.has(c._id)&&pathIds.has(n._id))?"onpath":(c._pv?"pv":"");
    h+=`<path class="edge ${cls}" d="M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}"/>`;
  }
  for(const n of all){
    const sel=SELECTED&&SELECTED._id===n._id, onp=pathIds.has(n._id);
    const label=n.row==null?"root":(n.player+" "+coordOf(n));
    const sub=METRIC==="N"?("N="+n.N):METRIC==="Q"?("Q="+n.Q.toFixed(3)):("P="+n.P.toFixed(2));
    h+=`<g class="tnode ${sel?'sel':''} ${onp?'onpath':''} ${n._pv?'pv':''}" data-id="${n._id}" transform="translate(${X(n)},${Y(n)})">
      <rect width="${NW}" height="${NH}" rx="7"/>
      <text x="${NW/2}" y="14" text-anchor="middle" font-size="11">${label}</text>
      <text class="sub" x="${NW/2}" y="26" text-anchor="middle" font-size="10">${sub}</text></g>`;
  }
  const svg=document.getElementById("tree"); svg.setAttribute("width",W); svg.setAttribute("height",H); svg.innerHTML=h;
  svg.querySelectorAll(".tnode").forEach(g=>g.addEventListener("click",()=>select(all.find(n=>n._id==+g.dataset.id))));
  if(SELECTED){const sn=all.find(n=>n._id===SELECTED._id);if(sn){const wrap=document.getElementById("treeWrap");
    wrap.scrollTo({left:X(sn)+NW/2-wrap.clientWidth/2, top:Y(sn)-wrap.clientHeight/2, behavior:"smooth"});}}
}

function drawEval(){
  const n=SELECTED||cur().root, pcls=n.player==="B"?"b":n.player==="W"?"w":"";
  const rows=[["手",n.row==null?"root":`<span class="pill ${pcls}">${n.player}</span> ${coordOf(n)}`],
    ["action_id",fmt(n.action_id)],["row, col",n.row==null?"—":`${n.row}, ${n.col}`],
    ["N (visits)",fmt(n.N)],["Q (mean)",fmt(n.Q)],["P (prior)",fmt(n.P)],
    ["p_logit",fmt(n.p_logit)],["p_noise",fmt(n.p_noise)],["v (network)",fmt(n.v)],
    ["r (reward)",fmt(n.r)],["children",(n.children||[]).length],["depth",n._depth]];
  document.getElementById("evalBox").innerHTML=`<table class="kv">${rows.map(([k,v])=>`<tr><td class="k">${k}</td><td class="v">${v}</td></tr>`).join("")}</table>`;
}
function drawArgmax(){
  const kids=cur().root.children||[]; if(!kids.length){document.getElementById("argmaxBox").innerHTML="";return;}
  const by=(f)=>kids.reduce((a,b)=>f(b)>f(a)?b:a);
  const tieN=kids.every(k=>k.N===kids[0].N), played=cur().played;
  const row=(l,k,note="")=>`<div class="row"><span>${l}</span><span>${k.player} ${coordOf(k)} ${note}</span></div>`;
  document.getElementById("argmaxBox").innerHTML=
    `<p class="lbl" style="margin-top:14px">root直下の「最も評価した手」</p>`+
    row("最大 N",by(k=>k.N),tieN?"(同点)":"")+row("最大 Q",by(k=>k.Q))+row("最大 P",by(k=>k.P))+
    (played?`<div class="row"><span>実際の着手</span><span>${played}</span></div>`:"");
}

function drawChart(){
  const svg=document.getElementById("chart"), W=svg.clientWidth||800, H=130, pad={l:36,r:10,t:10,b:18};
  const moves=GAME.moves, qs=moves.map(m=>m.root.Q);
  let lo=Math.min(...qs,0), hi=Math.max(...qs,0); if(hi-lo<0.02){lo-=0.1;hi+=0.1;}
  const maxX=Math.max(moves.length-1,1);
  const X=(i)=>pad.l+(i/maxX)*(W-pad.l-pad.r), Y=(q)=>pad.t+(1-(q-lo)/(hi-lo))*(H-pad.t-pad.b);
  let h="";
  h+=`<line x1="${pad.l}" y1="${Y(0)}" x2="${W-pad.r}" y2="${Y(0)}" stroke="#2a3445" stroke-width="1"/>`;
  h+=`<text x="4" y="${Y(hi)+4}" fill="var(--muted)" font-size="9" font-family="var(--mono)">${hi.toFixed(2)}</text>`;
  h+=`<text x="4" y="${Y(lo)+4}" fill="var(--muted)" font-size="9" font-family="var(--mono)">${lo.toFixed(2)}</text>`;
  const series=(who,col)=>{
    const pts=moves.map((m,i)=>({i,q:m.root.Q,w:m.to_play})).filter(p=>p.w===who);
    if(!pts.length)return "";
    let d=pts.map((p,k)=>(k?"L":"M")+X(p.i)+","+Y(p.q)).join(" ");
    let s=`<path d="${d}" fill="none" stroke="${col}" stroke-width="1.6" opacity="0.9"/>`;
    for(const p of pts) s+=`<circle cx="${X(p.i)}" cy="${Y(p.q)}" r="2.4" fill="${col}"/>`;
    return s;
  };
  h+=series("B","var(--bser)")+series("W","var(--wser)");
  h+=`<line x1="${X(PLY)}" y1="${pad.t}" x2="${X(PLY)}" y2="${H-pad.b}" stroke="var(--accent)" stroke-width="1.4"/>`;
  h+=`<circle cx="${X(PLY)}" cy="${Y(moves[PLY].root.Q)}" r="4" fill="var(--accent)" stroke="#0b0e14" stroke-width="1"/>`;
  svg.setAttribute("viewBox",`0 0 ${W} ${H}`); svg.innerHTML=h;
  svg.onclick=(e)=>{const r=svg.getBoundingClientRect();const px=(e.clientX-r.left)*(W/r.width);
    const i=Math.round(((px-pad.l)/(W-pad.l-pad.r))*maxX); if(i>=0&&i<moves.length)gotoPly(i);};
}

function renderMove(){
  const root=cur().root; indexTree(root); markPV(root);
  document.getElementById("metaInfo").textContent=`${GAME.game} · ${GAME.board_size}×${GAME.board_size} · to_play=${cur().to_play} · root N=${root.N}`;
  document.getElementById("boardHint").textContent= SELECTED&&SELECTED.row!=null
    ? `番号 = root からこのノードまでの着手順(桃=経路, 橙=選択ノード)。`
    : `丸 = 候補手(root children)。色と数字は指標(${METRIC})。`;
  drawBoard(); drawTree(); drawEval(); drawArgmax(); drawChart();
}
function select(n){SELECTED=n;drawBoard();drawTree();drawEval();}
function gotoPly(i){PLY=Math.max(0,Math.min(GAME.moves.length-1,i));SELECTED=null;
  document.getElementById("plySlider").value=PLY;
  document.getElementById("plyPos").textContent=`手番 ${PLY} / ${GAME.moves.length-1}`+(cur().played?` · 着手 ${cur().played}`:"");
  renderMove();}
function load(obj){
  GAME=normalize(obj); PLY=0; SELECTED=null;
  const sl=document.getElementById("plySlider"); sl.max=GAME.moves.length-1; sl.value=0;
  gotoPly(0);
}

document.getElementById("metricSeg").addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;
  document.querySelectorAll("#metricSeg button").forEach(x=>x.classList.remove("on"));b.classList.add("on");METRIC=b.dataset.m;renderMove();});
document.getElementById("plySlider").addEventListener("input",e=>gotoPly(+e.target.value));
document.getElementById("prevBtn").onclick=()=>gotoPly(PLY-1);
document.getElementById("nextBtn").onclick=()=>gotoPly(PLY+1);
document.getElementById("playBtn").onclick=function(){
  if(playTimer){clearInterval(playTimer);playTimer=null;this.textContent="▶";return;}
  this.textContent="⏸";
  playTimer=setInterval(()=>{ if(PLY>=GAME.moves.length-1){clearInterval(playTimer);playTimer=null;document.getElementById("playBtn").textContent="▶";return;} gotoPly(PLY+1); },800);
};
document.getElementById("fileIn").addEventListener("change",e=>{const f=e.target.files[0];if(!f)return;
  const r=new FileReader();r.onload=()=>{try{load(JSON.parse(r.result));}catch(err){alert("JSON解析失敗: "+err.message);}};r.readAsText(f);});
const dlg=document.getElementById("pasteDlg");
document.getElementById("pasteBtn").onclick=()=>{document.getElementById("pasteArea").value="";dlg.showModal();};
document.getElementById("pasteOk").addEventListener("click",e=>{const t=document.getElementById("pasteArea").value.trim();if(!t)return;
  try{load(JSON.parse(t));}catch(err){e.preventDefault();alert("JSON解析失敗: "+err.message);}});
window.addEventListener("resize",()=>{if(GAME)drawChart();});

load(SINGLE);
</script>
</body>
</html>
